<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🌶️ ส้มตำ Expense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0a00;--s1:#1c1200;--s2:#261800;--bd:#3d2800;
  --or:#ff6a00;--am:#ffb300;--re:#ff3c00;--gr:#00c853;
  --tx:#fff8ee;--mu:#a07840;
}
body{background:var(--bg);color:var(--tx);font-family:'Sarabun',system-ui,sans-serif;min-height:100vh;font-size:15px}

.hdr{
  background:linear-gradient(135deg,#1c1200,#0f0a00);
  border-bottom:1px solid var(--bd);
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:99;
}
.hdr-title{font-weight:800;font-size:18px;background:linear-gradient(90deg,var(--or),var(--am));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:var(--mu);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:6px}
.dot-live{width:6px;height:6px;background:var(--gr);border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:11px;color:var(--gr);font-weight:700}
.btn-ref{
  background:rgba(255,106,0,.15);border:1px solid var(--or);color:var(--or);
  padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:3px;-webkit-appearance:none;
}
.btn-ref:active{background:rgba(255,106,0,.3)}
.btn-ref:disabled{opacity:.5}
.spin{animation:rot .6s linear infinite;display:inline-block}
@keyframes rot{to{transform:rotate(360deg)}}

.cache-bar{background:rgba(255,179,0,.08);border-bottom:1px solid rgba(255,179,0,.2);padding:5px 14px;font-size:11px;color:var(--am);display:none}

main{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:520px;margin:0 auto;width:100%}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:13px 13px 11px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0}
.kpi.c1::after{background:linear-gradient(90deg,var(--or),var(--am))}
.kpi.c2::after{background:linear-gradient(90deg,var(--re),var(--or))}
.kpi.c3::after{background:linear-gradient(90deg,var(--am),#fff176)}
.kpi.c4::after{background:linear-gradient(90deg,var(--gr),#00bfa5)}
.kpi-ico{font-size:18px;margin-bottom:3px}
.kpi-lbl{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.kpi-val{font-size:18px;font-weight:800;color:var(--am);line-height:1.1}
.kpi-val.sm{font-size:15px}
.kpi-sub{font-size:10px;color:var(--mu);margin-top:1px}

.sec{font-size:11px;font-weight:800;color:var(--am);text-transform:uppercase;letter-spacing:.08em;border-left:3px solid var(--or);padding-left:7px;margin-bottom:9px}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:13px}

.bar-wrap{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:7px}
.bar-lbl{font-size:11px;color:var(--mu);width:52px;text-align:right;flex-shrink:0;line-height:1.3}
.bar-track{flex:1;background:rgba(61,40,0,.8);border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:4px}
.bar-amt{font-size:10px;font-weight:700;color:rgba(255,248,238,.9);white-space:nowrap}

.donut-wrap{display:flex;align-items:center;gap:14px}
.legend{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.leg-row{display:flex;align-items:center;gap:6px}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:11px;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leg-amt{font-size:11px;font-weight:700;color:var(--am);white-space:nowrap}
.leg-pct{font-size:10px;color:var(--mu)}

.tbl-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:13px;overflow:hidden}
.tbl-head{display:grid;grid-template-columns:22px 58px 1fr auto;padding:7px 10px;background:rgba(255,106,0,.08);border-bottom:1px solid var(--bd)}
.th{font-size:10px;font-weight:800;color:var(--or);text-transform:uppercase;letter-spacing:.05em}
.th.r{text-align:right}
.tbl-row{display:grid;grid-template-columns:22px 58px 1fr auto;padding:8px 10px;border-bottom:1px solid rgba(61,40,0,.4);align-items:center}
.tbl-row:last-child{border-bottom:none}
.td-no{font-size:10px;color:var(--mu)}
.td-date{font-size:11px;color:var(--mu)}
.td-item{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}
.cat-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:999px;margin-top:2px}
.td-amt{font-size:12px;font-weight:800;color:var(--am);text-align:right;white-space:nowrap}

/* pay badge */
.pay-row{display:flex;flex-wrap:wrap;gap:7px}
.pay-pill{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:8px 11px;display:flex;flex-direction:column;gap:2px;flex:1;min-width:80px}
.pay-name{font-size:10px;color:var(--mu);font-weight:700}
.pay-val{font-size:13px;font-weight:800;color:var(--tx)}
.pay-pct{font-size:10px;color:var(--mu)}

.loading{text-align:center;padding:50px 20px}
.spin-lg{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 10px}
.upd{font-size:10px;color:var(--mu);text-align:right;padding:3px 0}
.footer{text-align:center;padding:14px;font-size:10px;color:var(--mu);border-top:1px solid var(--bd)}

/* VAT summary */
.vat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.vat-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center}
.vat-lbl{font-size:10px;color:var(--mu);margin-bottom:3px}
.vat-val{font-size:13px;font-weight:800;color:var(--am)}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">🌶️ ร้านส้มตำ</div>
    <div class="hdr-sub">แดชบอร์ดค่าใช้จ่าย</div>
  </div>
  <div class="hdr-r">
    <div class="dot-live"></div><span class="live-txt">LIVE</span>
    <button class="btn-ref" onclick="loadData(false)" id="rbtn">
      <span id="rico">↻</span> รีเฟรช
    </button>
  </div>
</div>
<div class="cache-bar" id="cbar">⚡ แสดงข้อมูลเก่า — กำลังอัปเดต...</div>

<main id="main">
  <div class="loading"><div class="spin-lg"></div><div style="color:var(--mu);font-size:13px">กำลังโหลดข้อมูล...</div></div>
</main>

<div class="footer">🌶️ ส้มตำ Dashboard · Auto-refresh ทุก 5 นาที</div>

<script>
const SHEET_ID = '10D-GwPgOJ98JU-rTyzonTYsM8Gg6mTzluqy6Q5nJoCA';
const SHEET_NAME = 'รวม';
const CACHE_KEY = 'st_v4';
const CACHE_TTL = 5 * 60 * 1000;

const thM = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const PCOLORS = ['#00c853','#ffb300','#ff6a00','#ce93d8','#29b6f6','#ef5350','#80cbc4'];
const CMAP = {'วัตถุดิบ':'#ff7043','เครื่องดื่ม':'#29b6f6','บรรจุภัณฑ์':'#ab47bc','อุปกรณ์':'#ffca28','ของใช้ในร้าน':'#66bb6a','ค่าใช้จ่ายร้าน':'#ef5350','อื่นๆ':'#90a4ae'};

function cc(c){for(const k in CMAP)if(c&&c.includes(k.slice(0,3)))return CMAP[k];return'#90a4ae'}
function fmt(n){return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtI(n){return Math.round(n).toLocaleString('th-TH')}
function pa(v){if(!v&&v!==0)return 0;const n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?0:n}
function pd(v){
  if(!v)return null;
  // DD/MM/YYYY format
  const m=String(v).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  // Google Date serial
  if(typeof v==='number'){return new Date((v-25569)*86400*1000);}
  const d=new Date(v);return isNaN(d)?null:d;
}
function ds(d){if(!d)return'-';return`${d.getDate()} ${thM[d.getMonth()]}`}

function saveC(d){try{localStorage.setItem(CACHE_KEY,JSON.stringify({d,ts:Date.now()}))}catch(e){}}
function loadC(){try{const s=localStorage.getItem(CACHE_KEY);return s?JSON.parse(s):null}catch(e){return null}}

async function fetchData(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&_=${Date.now()}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const txt=await res.text();
  const json=JSON.parse(txt.substring(txt.indexOf('{'),txt.lastIndexOf('}')+1));
  const cols=json.table.cols.map(c=>c.label||'');
  return json.table.rows.map(r=>{
    const o={};
    r.c.forEach((cell,i)=>{o[cols[i]]=cell?(cell.f??cell.v):null;});
    return o;
  });
}

function processRows(rows){
  return rows.map(r=>{
    const amt=pa(r['ยอดเงิน']);
    if(amt<=0)return null;
    return{
      date:pd(r['วันที่']),
      shop:String(r['ร้านค้า/ผู้รับเงิน']||''),
      amt,
      cat:String(r['หมวดหมู่']||'อื่นๆ'),
      sub:String(r['หมวดย่อย']||''),
      detail:String(r['รายละเอียด']||''),
      pay:String(r['จ่ายผ่าน']||''),
      vat:pa(r['VAT']),
      hasVat:String(r['มีVAT']||'').toUpperCase()==='YES',
      taxDeduct:String(r['ลดหย่อนภาษีได้']||'').toUpperCase()==='YES',
    };
  }).filter(Boolean);
}

function donut(segs,sz=88){
  const tot=segs.reduce((s,x)=>s+x.v,0);if(!tot)return'';
  const r=36,cx=44,cy=44,sw=15,circ=2*Math.PI*r;
  let off=0,p='';
  segs.forEach(s=>{
    const pct=s.v/tot,dash=pct*circ;
    p+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}" stroke-dashoffset="${(-off*circ).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})" opacity=".85"/>`;
    off+=pct;
  });
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 88 88" style="flex-shrink:0">${p}</svg>`;
}

function render(data, fromCache){
  const now=new Date(),tm=now.getMonth(),ty=now.getFullYear();
  const prevM=(tm===0)?11:tm-1;
  const prevY=(tm===0)?ty-1:ty;

  const mD=data.filter(r=>r.date&&r.date.getMonth()===tm&&r.date.getFullYear()===ty);
  const yD=data.filter(r=>r.date&&r.date.getFullYear()===ty);
  const pmD=data.filter(r=>r.date&&r.date.getMonth()===prevM&&r.date.getFullYear()===prevY);

  const bills=mD.length;
  const totM=mD.reduce((s,r)=>s+r.amt,0);
  const totY=yD.reduce((s,r)=>s+r.amt,0);
  const totPM=pmD.reduce((s,r)=>s+r.amt,0);
  const avg=bills?totM/bills:0;
  const totalVat=mD.reduce((s,r)=>s+r.vat,0);
  const taxDeductAmt=mD.filter(r=>r.taxDeduct).reduce((s,r)=>s+r.amt,0);

  // Category
  const cats={};
  mD.forEach(r=>{cats[r.cat]=(cats[r.cat]||0)+r.amt;});
  const catArr=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxC=catArr[0]?catArr[0][1]:1;

  // Monthly
  const monthly=Array(12).fill(0);
  yD.forEach(r=>{if(r.date)monthly[r.date.getMonth()]+=r.amt;});
  const maxM=Math.max(...monthly,1);
  const aMon=monthly.map((v,i)=>({v,i})).filter(x=>x.v>0);

  // Payment
  const pays={};
  mD.forEach(r=>{const p=r.pay||'ไม่ระบุ';pays[p]=(pays[p]||0)+r.amt;});
  const payArr=Object.entries(pays).sort((a,b)=>b[1]-a[1]);

  // Top shops
  const shops={};
  mD.forEach(r=>{shops[r.shop]=(shops[r.shop]||0)+r.amt;});
  const shopArr=Object.entries(shops).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxSh=shopArr[0]?shopArr[0][1]:1;

  // Recent 10
  const recent=[...data].sort((a,b)=>(b.date||0)-(a.date||0)).slice(0,10);

  // MoM diff
  const momDiff=totPM?((totM-totPM)/totPM*100):0;
  const momTxt=totPM?(momDiff>=0?`▲ ${Math.abs(momDiff).toFixed(1)}% vs เดือนก่อน`:`▼ ${Math.abs(momDiff).toFixed(1)}% vs เดือนก่อน`):''
  const momColor=momDiff>0?'#ef5350':'#00c853';

  document.getElementById('main').innerHTML=`
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi c1"><div class="kpi-ico">🧾</div><div class="kpi-lbl">บิลเดือนนี้</div><div class="kpi-val">${fmtI(bills)}</div><div class="kpi-sub">${thM[tm]} ${ty}</div></div>
      <div class="kpi c2"><div class="kpi-ico">💸</div><div class="kpi-lbl">เดือนนี้</div><div class="kpi-val sm">฿${fmt(totM)}</div><div class="kpi-sub" style="color:${totM>totPM?'#ef5350':'#00c853'}">${momTxt||thM[tm]+' '+ty}</div></div>
      <div class="kpi c3"><div class="kpi-ico">📅</div><div class="kpi-lbl">ปี ${ty}</div><div class="kpi-val sm">฿${fmt(totY)}</div><div class="kpi-sub">${yD.length} รายการ</div></div>
      <div class="kpi c4"><div class="kpi-ico">📊</div><div class="kpi-lbl">เฉลี่ย/บิล</div><div class="kpi-val sm">฿${fmt(avg)}</div><div class="kpi-sub">เดือนนี้</div></div>
    </div>

    <!-- VAT & Tax -->
    <div class="card">
      <div class="sec">ภาษี & VAT เดือนนี้</div>
      <div class="vat-grid">
        <div class="vat-card"><div class="vat-lbl">VAT รวม</div><div class="vat-val">฿${fmtI(totalVat)}</div></div>
        <div class="vat-card"><div class="vat-lbl">ลดหย่อนภาษีได้</div><div class="vat-val" style="color:#00c853">฿${fmtI(taxDeductAmt)}</div></div>
        <div class="vat-card"><div class="vat-lbl">รายการมี VAT</div><div class="vat-val">${mD.filter(r=>r.hasVat).length} บิล</div></div>
      </div>
    </div>

    <!-- Categories -->
    <div class="card">
      <div class="sec">หมวดหมู่เดือนนี้</div>
      <div class="bar-wrap">
        ${catArr.map(([cat,v])=>`
        <div class="bar-row">
          <div class="bar-lbl">${cat.slice(0,5)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,Math.round(v/maxC*100))}%;background:${cc(cat)}35;border-right:2px solid ${cc(cat)}">
            <span class="bar-amt">฿${fmtI(v)}</span>
          </div></div>
        </div>`).join('')}
      </div>
    </div>

    <!-- Monthly -->
    <div class="card">
      <div class="sec">รายจ่ายรายเดือน ${ty}</div>
      <div class="bar-wrap">
        ${aMon.map(({v,i})=>`
        <div class="bar-row">
          <div class="bar-lbl">${thM[i]}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,Math.round(v/maxM*100))}%;background:${i===tm?'rgba(255,106,0,.5)':'rgba(255,106,0,.18)'};border-right:2px solid ${i===tm?'var(--or)':'rgba(255,106,0,.4)'}">
            <span class="bar-amt">฿${fmtI(v)}</span>
          </div></div>
        </div>`).join('')}
      </div>
    </div>

    <!-- Payment -->
    <div class="card">
      <div class="sec">ช่องทางชำระเดือนนี้</div>
      <div class="donut-wrap">
        ${donut(payArr.map((p,i)=>({v:p[1],c:PCOLORS[i%PCOLORS.length]})))}
        <div class="legend">
          ${payArr.map(([k,v],i)=>`
          <div class="leg-row">
            <div class="leg-dot" style="background:${PCOLORS[i%PCOLORS.length]}"></div>
            <div class="leg-name">${k}</div>
            <div style="text-align:right">
              <div class="leg-amt">฿${fmtI(v)}</div>
              <div class="leg-pct">${totM?Math.round(v/totM*100):0}%</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Top shops -->
    <div class="card">
      <div class="sec">ร้านค้าที่ซื้อบ่อยเดือนนี้</div>
      <div class="bar-wrap">
        ${shopArr.map(([shop,v])=>`
        <div class="bar-row">
          <div class="bar-lbl" style="font-size:10px;width:64px">${shop.slice(0,7)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,Math.round(v/maxSh*100))}%;background:rgba(255,179,0,.25);border-right:2px solid var(--am)">
            <span class="bar-amt">฿${fmtI(v)}</span>
          </div></div>
        </div>`).join('')}
      </div>
    </div>

    <!-- Recent 10 -->
    <div>
      <div class="sec">10 รายการล่าสุด</div>
      <div class="tbl-wrap">
        <div class="tbl-head">
          <span class="th">#</span><span class="th">วันที่</span>
          <span class="th">รายการ</span><span class="th r">บาท</span>
        </div>
        ${recent.map((r,i)=>{
          const clr=cc(r.cat);
          const lbl=r.detail||r.shop||'-';
          return`<div class="tbl-row">
            <span class="td-no">${i+1}</span>
            <span class="td-date">${ds(r.date)}</span>
            <div><div class="td-item">${lbl}</div><span class="cat-tag" style="background:${clr}20;color:${clr}">${r.cat}</span></div>
            <span class="td-amt">฿${fmt(r.amt)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="upd">อัปเดต: ${now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}${fromCache?' · cache':''}</div>
  `;
}

let loading=false;
async function loadData(useCache=true){
  if(loading)return;
  if(useCache){
    const cached=loadC();
    if(cached&&(Date.now()-cached.ts<CACHE_TTL)){render(cached.d,true);return;}
    if(cached){render(cached.d,true);document.getElementById('cbar').style.display='block';}
  }
  loading=true;
  const rb=document.getElementById('rbtn'),ri=document.getElementById('rico');
  if(rb)rb.disabled=true;if(ri)ri.classList.add('spin');
  try{
    const rows=await fetchData();
    const data=processRows(rows);
    if(!data.length)throw new Error('ไม่พบข้อมูล');
    saveC(data);render(data,false);
    document.getElementById('cbar').style.display='none';
  }catch(e){
    const cached=loadC();
    if(cached){render(cached.d,true);const u=document.querySelector('.upd');if(u)u.textContent+=' ⚠️ '+e.message;}
    else{
      document.getElementById('main').innerHTML=`
        <div style="background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:28px 16px;text-align:center">
          <div style="font-size:28px;margin-bottom:8px">⚠️</div>
          <div style="font-weight:700;margin-bottom:6px">ดึงข้อมูลไม่ได้</div>
          <div style="font-size:12px;color:var(--mu)">Error: ${e.message}</div>
        </div>`;
    }
  }finally{
    loading=false;if(rb)rb.disabled=false;if(ri)ri.classList.remove('spin');
  }
}

loadData(true);
setInterval(()=>loadData(false),5*60*1000);
</script>
</body>
</html>
